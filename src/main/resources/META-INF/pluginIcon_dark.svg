<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <defs>
    <linearGradient id="gradDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#1E293B" />
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#34D399" />
    </linearGradient>
  </defs>
  <!-- Background Squircle with 2px padding -->
  <rect x="2" y="2" width="36" height="36" rx="9" fill="url(#gradDark)" stroke="#334155" stroke-width="1" />
  
  <!-- Gear shape representing automation and scheduling -->
  <g stroke="url(#iconGrad)" stroke-width="2.5" stroke-linecap="round">
    <!-- Center ring -->
    <circle cx="20" cy="20" r="9" fill="none" />
    <!-- Gear teeth -->
    <line x1="20" y1="11" x2="20" y2="7" />
    <line x1="20" y1="29" x2="20" y2="33" />
    <line x1="11" y1="20" x2="7" y2="20" />
    <line x1="29" y1="20" x2="33" y2="20" />
    
    <line x1="13.6" y1="13.6" x2="10.8" y2="10.8" />
    <line x1="26.4" y1="26.4" x2="29.2" y2="29.2" />
    <line x1="13.6" y1="26.4" x2="10.8" y2="29.2" />
    <line x1="26.4" y1="13.6" x2="29.2" y2="10.8" />
  </g>
  
  <!-- Clock hands inside the gear -->
  <path d="M 20 15 L 20 20 L 24 20" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
</svg>
