name: Build Plugin

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    name: Build & Package Plugin
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the code
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Step 2: Set up Java JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Step 3: Set up Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # Step 4: Make gradlew executable
      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew

      # Step 5: Build and verify the plugin
      - name: Build Plugin
        run: ./gradlew buildPlugin

      # Step 6: Upload the built plugin zip as an artifact
      - name: Upload Plugin Artifact
        uses: actions/upload-artifact@v4
        with:
          name: task-scheduler-plugin
          path: build/distributions/*.zip
          if-no-files-found: error
